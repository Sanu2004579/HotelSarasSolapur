<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saras Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a96e; --gold-light: #e8c98a; --bg: #0d0d0d;
      --bg-2: #141414; --bg-3: #1a1a1a; --bg-4: #222222;
      --border: #2a2a2a; --text: #e0e0e0; --text-muted: #888;
      --success: #4caf7d; --warning: #f0a500; --danger: #e05252; --info: #5b8dee;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 60% 40%, #1a1208 0%, #0d0d0d 70%); }
    .login-box { background: var(--bg-2); border: 1px solid var(--border); border-top: 2px solid var(--gold); border-radius: 12px; padding: 50px 40px; width: 100%; max-width: 420px; text-align: center; }
    .login-logo { font-family: 'Forum', serif; font-size: 40px; color: var(--gold); letter-spacing: 4px; margin-bottom: 6px; }
    .login-subtitle { color: var(--text-muted); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
    .login-box input { width: 100%; background: var(--bg-3); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; margin-bottom: 14px; outline: none; transition: border-color 0.2s; }
    .login-box input:focus { border-color: var(--gold); }
    .login-btn { width: 100%; background: var(--gold); color: #111; border: none; border-radius: 8px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 1px; transition: background 0.2s; margin-top: 6px; }
    .login-btn:hover { background: var(--gold-light); }
    .login-error { background: #2a1010; border: 1px solid var(--danger); color: #ff8a8a; padding: 10px 16px; border-radius: 6px; font-size: 13px; margin-top: 14px; display: none; }

    #admin-panel { display: none; }
    .topbar { background: var(--bg-2); border-bottom: 1px solid var(--border); padding: 0 30px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-logo { font-family: 'Forum', serif; font-size: 24px; color: var(--gold); letter-spacing: 3px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; background: var(--bg-3); border-radius: 8px; padding: 4px; margin-bottom: 24px; }
    .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
    .tab-btn.active { background: var(--gold); color: #111; font-weight: 600; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .admin-badge { background: var(--bg-3); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 13px; color: var(--text-muted); }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .main { padding: 30px; max-width: 1300px; margin: 0 auto; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 30px; }
    .stat-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 24px; position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .stat-card.gold::before { background: var(--gold); }
    .stat-card.green::before { background: var(--success); }
    .stat-card.blue::before { background: var(--info); }
    .stat-card.orange::before { background: var(--warning); }
    .stat-card.purple::before { background: #a855f7; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 10px; }
    .stat-value { font-family: 'Forum', serif; font-size: 38px; color: var(--gold); line-height: 1; }
    .stat-card.green .stat-value { color: var(--success); }
    .stat-card.blue .stat-value { color: var(--info); }
    .stat-card.orange .stat-value { color: var(--warning); }
    .stat-card.purple .stat-value { color: #a855f7; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .section-title { font-family: 'Forum', serif; font-size: 22px; color: var(--gold); letter-spacing: 1px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { background: var(--bg-3); border: 1px solid var(--border); color: var(--text-muted); padding: 7px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { background: var(--gold); color: #111; border-color: var(--gold); }
    .refresh-btn { background: var(--bg-3); border: 1px solid var(--border); color: var(--gold); padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .refresh-btn:hover { background: var(--gold); color: #111; }

    .table-wrap { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    thead tr { background: var(--bg-3); border-bottom: 1px solid var(--border); }
    th { padding: 14px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); font-weight: 500; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-3); }
    td { padding: 14px 16px; font-size: 13px; color: var(--text); }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .badge-pending, .badge-received { background: #2a2000; color: var(--warning); border: 1px solid #4a3800; }
    .badge-confirmed, .badge-preparing { background: #1a1a2a; color: var(--info); border: 1px solid #2a2a5a; }
    .badge-ready { background: #0a2a15; color: var(--success); border: 1px solid #1a4a25; }
    .badge-delivered, .badge-completed { background: #0a1a0a; color: #6fcf97; border: 1px solid #1a3a1a; }
    .badge-cancelled { background: #2a0a0a; color: var(--danger); border: 1px solid #4a1a1a; }

    .action-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .action-btn { padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; border: 1px solid; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
    .btn-preparing { background: #1a1a2a; color: var(--info); border-color: #2a2a5a; }
    .btn-preparing:hover { background: var(--info); color: #fff; }
    .btn-ready { background: #0a2a15; color: var(--success); border-color: #1a4a25; }
    .btn-ready:hover { background: var(--success); color: #111; }
    .btn-delivered { background: #0a1a0a; color: #6fcf97; border-color: #1a3a1a; }
    .btn-delivered:hover { background: #6fcf97; color: #111; }
    .btn-confirm { background: #0a2a15; color: var(--success); border-color: #1a4a25; }
    .btn-confirm:hover { background: var(--success); color: #111; }
    .btn-cancel { background: #2a0a0a; color: var(--danger); border-color: #4a1a1a; }
    .btn-cancel:hover { background: var(--danger); color: #fff; }
    .btn-delete { background: var(--bg-3); color: var(--text-muted); border-color: var(--border); }
    .btn-delete:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    .order-items { font-size: 12px; color: var(--text-muted); }
    .order-items span { display: block; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

    #toast { position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: #111; padding: 14px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; max-width: 320px; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: var(--danger); color: #fff; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">SARAS</div>
    <div class="login-subtitle">Admin Panel</div>
    <input type="email" id="login-email" placeholder="Admin Email">
    <input type="password" id="login-password" placeholder="Password">
    <button class="login-btn" onclick="login()">Login</button>
    <div class="login-error" id="login-error">Invalid email or password.</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="topbar">
    <div>
      <span class="topbar-logo">SARAS</span>
      <span style="color:var(--text-muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-left:10px;">Admin Panel</span>
    </div>
    <div class="topbar-right">
      <div class="admin-badge" id="admin-email-badge">admin</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="main">

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card gold"><div class="stat-label">Total Reservations</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat-card orange"><div class="stat-label">Pending Bookings</div><div class="stat-value" id="stat-pending">—</div></div>
      <div class="stat-card green"><div class="stat-label">Confirmed</div><div class="stat-value" id="stat-confirmed">—</div></div>
      <div class="stat-card purple"><div class="stat-label">Total Orders</div><div class="stat-value" id="stat-orders">—</div></div>
      <div class="stat-card blue"><div class="stat-label">Subscribers</div><div class="stat-value" id="stat-subscribers">—</div></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('reservations', this)">📅 Reservations</button>
      <button class="tab-btn" onclick="switchTab('orders', this)">🍽️ Orders</button>
    </div>

    <!-- RESERVATIONS TAB -->
    <div class="tab-content active" id="tab-reservations">
      <div class="section-header">
        <div class="section-title">All Reservations</div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <div class="filter-row">
            <button class="filter-btn active" onclick="filterReservations('all',this)">All</button>
            <button class="filter-btn" onclick="filterReservations('pending',this)">Pending</button>
            <button class="filter-btn" onclick="filterReservations('confirmed',this)">Confirmed</button>
            <button class="filter-btn" onclick="filterReservations('cancelled',this)">Cancelled</button>
          </div>
          <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Name</th><th>Phone</th><th>Persons</th>
              <th>Date</th><th>Time</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="reservations-tbody">
            <tr><td colspan="8"><div class="loading">Loading...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div class="tab-content" id="tab-orders">
      <div class="section-header">
        <div class="section-title">All Orders</div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <div class="filter-row">
            <button class="filter-btn active" onclick="filterOrders('all',this)">All</button>
            <button class="filter-btn" onclick="filterOrders('received',this)">🆕 Received</button>
            <button class="filter-btn" onclick="filterOrders('preparing',this)">👨‍🍳 Preparing</button>
            <button class="filter-btn" onclick="filterOrders('ready',this)">✅ Ready</button>
            <button class="filter-btn" onclick="filterOrders('delivered',this)">🎉 Delivered</button>
          </div>
          <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Name</th><th>Phone</th><th>Table</th>
              <th>Items Ordered</th><th>Total</th><th>Date</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="9"><div class="loading">Loading...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:5000/api';
  let token = localStorage.getItem('saras_token');
  let allReservations = [], allOrders = [];
  let currentResFilter = 'all', currentOrderFilter = 'all';

  window.onload = () => { if (token) showPanel(); };

  // ── Login ────────────────────────────────────────────────────
  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value.trim();
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    try {
      const res = await fetch(`${API}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (data.success) {
        token = data.token;
        localStorage.setItem('saras_token', token);
        document.getElementById('admin-email-badge').textContent = data.admin.email;
        showPanel();
      } else {
        errEl.textContent = data.message || 'Invalid credentials.';
        errEl.style.display = 'block';
      }
    } catch {
      errEl.textContent = 'Cannot connect to server!';
      errEl.style.display = 'block';
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
  });

  function showPanel() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadDashboard();
  }

  function logout() {
    localStorage.removeItem('saras_token');
    token = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-panel').style.display = 'none';
  }

  // ── Tabs ─────────────────────────────────────────────────────
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
    if (tab === 'orders') loadOrders();
  }

  // ── Dashboard ─────────────────────────────────────────────────
  async function loadDashboard() {
    await Promise.all([loadStats(), loadReservations(), loadOrders()]);
  }

  async function loadStats() {
    try {
      const res = await fetch(`${API}/admin/dashboard`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (data.success) {
        document.getElementById('stat-total').textContent = data.data.totalReservations;
        document.getElementById('stat-pending').textContent = data.data.pendingReservations;
        document.getElementById('stat-confirmed').textContent = data.data.confirmedReservations;
        document.getElementById('stat-subscribers').textContent = data.data.totalSubscribers;
        document.getElementById('stat-orders').textContent = data.data.totalOrders || 0;
      }
    } catch {}
  }

  // ── Reservations ──────────────────────────────────────────────
  async function loadReservations() {
    const tbody = document.getElementById('reservations-tbody');
    tbody.innerHTML = `<tr><td colspan="8"><div class="loading">Loading...</div></td></tr>`;
    try {
      const res = await fetch(`${API}/reservations?limit=100`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (data.success) { allReservations = data.data; renderReservations(currentResFilter); }
    } catch {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">⚠️</div><p>Failed to load.</p></div></td></tr>`;
    }
  }

  function renderReservations(filter) {
    currentResFilter = filter;
    const tbody = document.getElementById('reservations-tbody');
    const filtered = filter === 'all' ? allReservations : allReservations.filter(r => r.status === filter);
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">📅</div><p>No ${filter} reservations.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map((r, i) => `
      <tr>
        <td style="color:var(--text-muted)">${i+1}</td>
        <td><strong>${r.name}</strong></td>
        <td>${r.phone}</td>
        <td style="text-align:center">${r.persons}</td>
        <td>${formatDate(r.date)}</td>
        <td>${r.time}</td>
        <td><span class="badge badge-${r.status}">${r.status}</span></td>
        <td>
          <div class="action-btns">
            ${r.status !== 'confirmed' ? `<button class="action-btn btn-confirm" onclick="updateResStatus('${r._id}','confirmed')">✓ Confirm</button>` : ''}
            ${r.status !== 'cancelled' ? `<button class="action-btn btn-cancel" onclick="updateResStatus('${r._id}','cancelled')">✗ Cancel</button>` : ''}
            <button class="action-btn btn-delete" onclick="deleteRes('${r._id}')">🗑</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function filterReservations(filter, btn) {
    document.querySelectorAll('#tab-reservations .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderReservations(filter);
  }

  async function updateResStatus(id, status) {
    try {
      const res = await fetch(`${API}/reservations/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ status }),
      });
      const data = await res.json();
      if (data.success) { showToast(`✅ Reservation ${status}!`); await loadReservations(); await loadStats(); }
    } catch { showToast('Failed to update.', true); }
  }

  async function deleteRes(id) {
    if (!confirm('Delete this reservation?')) return;
    try {
      await fetch(`${API}/reservations/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      showToast('🗑️ Deleted.'); await loadReservations(); await loadStats();
    } catch { showToast('Failed to delete.', true); }
  }

  // ── Orders ────────────────────────────────────────────────────
  async function loadOrders() {
    const tbody = document.getElementById('orders-tbody');
    tbody.innerHTML = `<tr><td colspan="9"><div class="loading">Loading...</div></td></tr>`;
    try {
      const res = await fetch(`${API}/orders?limit=100`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (data.success) { allOrders = data.data; renderOrders(currentOrderFilter); }
    } catch {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="icon">⚠️</div><p>Failed to load orders.</p></div></td></tr>`;
    }
  }

  function renderOrders(filter) {
    currentOrderFilter = filter;
    const tbody = document.getElementById('orders-tbody');
    const filtered = filter === 'all' ? allOrders : allOrders.filter(o => o.status === filter);
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="icon">🍽️</div><p>No ${filter} orders found.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map((o, i) => `
      <tr>
        <td style="color:var(--text-muted)">${i+1}</td>
        <td><strong>${o.name}</strong></td>
        <td>${o.phone}</td>
        <td style="text-align:center"><strong style="color:var(--gold)">Table ${o.tableNumber}</strong></td>
        <td>
          <div class="order-items">
            ${o.items.map(item => `<span>• ${item.name} x${item.quantity} — ₹${item.price * item.quantity}</span>`).join('')}
          </div>
        </td>
        <td><strong style="color:var(--gold)">₹${o.totalAmount}</strong></td>
        <td>${formatDate(o.date)}</td>
        <td><span class="badge badge-${o.status}">${o.status}</span></td>
        <td>
          <div class="action-btns">
            ${o.status === 'received' ? `<button class="action-btn btn-preparing" onclick="updateOrderStatus('${o._id}','preparing')">👨‍🍳 Preparing</button>` : ''}
            ${o.status === 'preparing' ? `<button class="action-btn btn-ready" onclick="updateOrderStatus('${o._id}','ready')">✅ Ready</button>` : ''}
            ${o.status === 'ready' ? `<button class="action-btn btn-delivered" onclick="updateOrderStatus('${o._id}','delivered')">🎉 Delivered</button>` : ''}
            <button class="action-btn btn-delete" onclick="deleteOrder('${o._id}')">🗑</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function filterOrders(filter, btn) {
    document.querySelectorAll('#tab-orders .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders(filter);
  }

  async function updateOrderStatus(id, status) {
    try {
      const res = await fetch(`${API}/orders/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ status }),
      });
      const data = await res.json();
      if (data.success) { showToast(`✅ Order is now "${status}"!`); await loadOrders(); await loadStats(); }
    } catch { showToast('Failed to update order.', true); }
  }

  async function deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    try {
      await fetch(`${API}/orders/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      showToast('🗑️ Order deleted.'); await loadOrders(); await loadStats();
    } catch { showToast('Failed to delete.', true); }
  }

  // ── Utils ─────────────────────────────────────────────────────
  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error show' : 'show';
    setTimeout(() => t.className = '', 3500);
  }
</script>
</body>
</html>
